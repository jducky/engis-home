<style>
:root {
  --navy:    #060F1A;
  --navy2:   #0A1A28;
  --navy3:   #0D2135;
  --panel:   #091828;
  --border:  #163248;

  --text3:   #3E6B88;
  --white:   #FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--text);display:flex;flex-direction:column;}

/* ── 헤더 ── */
.hdr{
  background:var(--panel);border-bottom:1px solid var(--border);
  height:52px;flex-shrink:0;display:flex;align-items:center;padding:0 18px;gap:14px;z-index:200;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;color:var(--teal2);text-shadow:0 0 18px rgba(20,184,166,.4);}
.logo span{color:var(--text);opacity:.4;margin:0 5px;}
.hdr-title{font-size:12px;color:var(--text2);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hbadge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:var(--green);}
.hbadge2{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600;background:rgba(14,95,161,.15);border:1px solid rgba(14,95,161,.3);color:var(--sky);}
.clk{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}

/* ── 3단 레이아웃 ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ═══ 왼쪽: 시나리오 설정 패널 ═══ */
.setup-panel{
  width:268px;flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sp-head{
  padding:12px 14px 10px;border-bottom:1px solid var(--border);
  font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;
}
.sp-scroll{flex:1;overflow-y:auto;padding:10px 12px;}
.sp-scroll::-webkit-scrollbar{width:3px;}
.sp-scroll::-webkit-scrollbar-thumb{background:var(--border);}

/* 섹션 */
.sp-sec{margin-bottom:14px;}
.sp-sec-title{
  font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.sp-sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* 권역 선택 */
.region-btns{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.rbtn{
  padding:6px 8px;border-radius:5px;border:1px solid var(--border);
  font-size:10px;color:var(--text3);cursor:pointer;background:transparent;
  font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center;
}
.rbtn:hover{border-color:var(--border2);color:var(--text2);}
.rbtn.on{background:rgba(13,148,136,.15);border-color:var(--teal);color:var(--teal2);}

/* 시나리오 카드 */
.scenario-card{
  background:var(--navy3);border:1px solid var(--border);border-radius:6px;
  padding:10px 11px;margin-bottom:5px;cursor:pointer;transition:all .2s;
}
.scenario-card:hover{border-color:var(--border2);}
.scenario-card.on{border-color:var(--teal);background:rgba(13,148,136,.08);}
.sc-head{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.sc-icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.sc-name{font-size:11px;font-weight:600;color:var(--text);}
.sc-desc{font-size:9px;color:var(--text3);line-height:1.5;}
.sc-check{margin-left:auto;font-size:12px;color:var(--teal2);display:none;}
.scenario-card.on .sc-check{display:block;}

/* 슬라이더 */
.slider-row{margin-bottom:10px;}
.sl-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:5px;}
.sl-val{font-family:'JetBrains Mono',monospace;color:var(--teal2);font-weight:600;}
input[type=range]{
  width:100%;height:4px;border-radius:2px;outline:none;border:none;cursor:pointer;
  background:linear-gradient(90deg,var(--teal) var(--pct,50%),rgba(255,255,255,.08) var(--pct,50%));
  -webkit-appearance:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--teal2);border:2px solid var(--navy);box-shadow:0 0 6px rgba(20,184,166,.4);
}

/* 실행 버튼 */
.run-btn{
  margin:10px 12px 12px;padding:10px 0;border-radius:6px;border:none;
  background:linear-gradient(135deg,var(--teal),var(--blue));
  color:var(--white);font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s;box-shadow:0 4px 16px rgba(13,148,136,.25);
  flex-shrink:0;
}
.run-btn:hover{opacity:.9;}
.run-btn:active{transform:scale(.98);}
.run-spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;display:none;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ 중앙: 결과 시각화 ═══ */
.result-area{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.result-area::-webkit-scrollbar{width:4px;}
.result-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* 진행 오버레이 */
.run-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(6,15,26,.85);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;
}
.run-overlay.show{opacity:1;pointer-events:all;}
.run-circle{
  width:64px;height:64px;border-radius:50%;
  border:3px solid var(--border2);border-top-color:var(--teal2);
  animation:spin .8s linear infinite;
}
.run-step{font-size:12px;color:var(--teal2);font-family:'JetBrains Mono',monospace;}
.run-prog-bg{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.run-prog{height:3px;background:var(--teal2);border-radius:2px;width:0%;transition:width .3s;}

/* 섹션 헤더 */
.sec-hdr{
  font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:0;
  display:flex;align-items:center;gap:8px;
}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

/* CRI 요약 카드 */
.cri-summary{
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:16px;position:relative;overflow:hidden;
}
.cri-summary::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradBar,linear-gradient(90deg,var(--red),var(--orange)));}
.cri-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.cri-main{}
.cri-region-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.cri-scenario-tag{font-size:10px;color:var(--text3);}
.cri-right{text-align:right;}
.cri-number{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;line-height:1;}
.cri-unit{font-size:10px;color:var(--text3);margin-top:2px;}

/* 72h 타임라인 바 */
.timeline-bar{height:32px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:8px;}
.tlb-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.8);transition:flex .8s;}
.tl-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* 6개 예측 패널 */
.pred-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.pred-card{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px;position:relative;overflow:hidden;
}
.pred-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.pred-card.heat::before{background:linear-gradient(90deg,var(--red),var(--orange));}
.pred-card.oxy::before{background:linear-gradient(90deg,var(--blue),var(--sky));}
.pred-card.algae::before{background:linear-gradient(90deg,var(--green),var(--teal2));}
.pred-card.sed::before{background:linear-gradient(90deg,var(--amber),#F97316);}
.pred-card.mld::before{background:linear-gradient(90deg,var(--purple),var(--pink));}
.pred-card.cri::before{background:linear-gradient(90deg,var(--red),var(--purple));}
.pc-label{font-size:9px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px;}
.pc-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1;margin-bottom:4px;}
.pc-unit{font-size:9px;color:var(--text3);font-family:'Noto Sans KR',sans-serif;font-weight:400;}
.pc-trend{font-size:9px;margin-bottom:8px;}
.pc-spark{height:36px;width:100%;}

/* 피해 리스크 테이블 */
.risk-table{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.rt-head{background:var(--navy3);display:grid;grid-template-columns:1fr 80px 80px 80px;padding:8px 12px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.rt-row{display:grid;grid-template-columns:1fr 80px 80px 80px;padding:9px 12px;border-top:1px solid var(--border);transition:background .15s;}
.rt-row:hover{background:rgba(255,255,255,.02);}
.rt-species{font-size:11px;color:var(--text);}
.rt-cell{font-size:10px;color:var(--text2);text-align:center;font-family:'JetBrains Mono',monospace;}
.rt-prob{font-weight:700;}
.prob-h{color:var(--red);}
.prob-m{color:var(--orange);}
.prob-l{color:var(--amber);}
.prob-n{color:var(--green);}
.rt-risk-bar{height:4px;border-radius:2px;margin-top:3px;}

/* 모델 구성 뷰 */
.model-flow{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:14px;display:flex;align-items:center;gap:0;overflow-x:auto;
}
.mf-box{
  background:var(--navy3);border:1px solid var(--border2);border-radius:6px;
  padding:9px 12px;flex-shrink:0;text-align:center;min-width:90px;
  transition:border-color .3s,background .3s;
}
.mf-box.active{border-color:var(--teal);background:rgba(13,148,136,.1);box-shadow:0 0 12px rgba(13,148,136,.15);}
.mf-icon{font-size:16px;margin-bottom:4px;}
.mf-label{font-size:9px;color:var(--text3);line-height:1.3;}
.mf-name{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:2px;}
.mf-arrow{font-size:16px;color:var(--border2);padding:0 6px;flex-shrink:0;transition:color .3s;}
.mf-arrow.active{color:var(--teal);}

/* ═══ 오른쪽: 입력 모니터 ═══ */
.input-panel{
  width:248px;flex-shrink:0;
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-hidden;
}
.ip-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.ip-scroll{flex:1;overflow-y:auto;padding:10px 12px;}
.ip-scroll::-webkit-scrollbar{width:3px;}
.ip-scroll::-webkit-scrollbar-thumb{background:var(--border);}

/* 데이터 소스 */
.ds-card{background:var(--navy3);border:1px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:6px;}
.ds-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.ds-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ds-name{font-size:10px;font-weight:600;color:var(--text);}
.ds-status{font-size:9px;margin-left:auto;font-family:'JetBrains Mono',monospace;}
.ds-meta{font-size:9px;color:var(--text3);line-height:1.5;}

/* 입력 변수 게이지 */
.var-row{margin-bottom:8px;}
.var-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:3px;}
.var-val{font-family:'JetBrains Mono',monospace;font-weight:600;}
.var-bar-bg{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.var-bar{height:5px;border-radius:3px;}

/* 앙상블 분포 */
.ensemble-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin-bottom:4px;}
.ens-dot{height:20px;border-radius:2px;opacity:.7;}

/* 하단 상태바 */
.statusbar{
  height:26px;background:rgba(6,15,26,.96);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:18px;flex-shrink:0;
}
.sb-i{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);}
.sb-d{width:5px;height:5px;border-radius:50%;background:var(--green);}
.sb-d.w{background:var(--amber);}

/* 토스트 */
#toast{position:fixed;bottom:38px;left:50%;transform:translateX(-50%) translateY(50px);background:rgba(13,148,136,.95);border:1px solid var(--teal2);border-radius:8px;padding:8px 18px;font-size:11px;color:var(--white);opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>

// 슬라이더
function updSlider(el,id,fn){

  el.style.setProperty('--pct',((val-min)/(max-min)*100)+'%');
  document.getElementById(id).textContent=fn(val);
}
document.querySelectorAll('input[type=range]').forEach(el=>{
  const min=+el.min,max=+el.max,val=+el.value;
  el.style.setProperty('--pct',((val-min)/(max-min)*100)+'%');
});

// 권역 선택
const regionData={
  '남해 통영·거제':{cri:'0.74',level:'4단계 경보',lc:'var(--red)',scen:'고수온 + 빈산소',

  '서해 가로림만':{cri:'0.31',level:'2단계 주의',lc:'var(--amber)',scen:'수온 상승 감시',
    tl:[{f:2,c:'var(--amber)',l:'주의'},{f:8,c:'var(--green)',l:'관심'}]},
  '동해 강릉·속초':{cri:'0.18',level:'1단계 관심',lc:'var(--green)',scen:'정상 감시',
    tl:[{f:10,c:'var(--green)',l:'관심'}]},
  '남해 고흥':{cri:'0.38',level:'2단계 주의',lc:'var(--amber)',scen:'고수온 단독',
    tl:[{f:3,c:'var(--amber)',l:'주의'},{f:7,c:'var(--green)',l:'관심'}]},
};

let curRegion='남해 통영·거제';

  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  curRegion=name;
  const d=regionData[name];
  if(!d)return;
  document.getElementById('criRegion').textContent=name+'권';
  document.getElementById('criNum').textContent=d.cri;
  document.getElementById('criNum').style.color=d.lc;

const steps=[
  ['데이터 전처리 중...','ROMS/HYCOM 다운스케일링 (500m 격자화)',8],
  ['조석·조류 계산 중...','T_TIDE 조화분석 — 통영 조화상수 적용',22],

  ['앙상블 계산 중...','50개 멤버 불확실성 추정',78],
  ['CRI 산출 중...','복합위험지수 공간 분포 계산',88],
  ['XAI 분해 중...','SHAP TreeExplainer 기여도 계산',96],
  ['완료!','GPA 예측 파이프라인 완료',100],
];

function runModel(){
  const overlay=document.getElementById('overlay');
  const btn=document.getElementById('runBtn');
  const spinner=document.getElementById('spinner');
  const btnTxt=document.getElementById('runBtnTxt');
  overlay.classList.add('show');
  spinner.style.display='block';
  btnTxt.textContent='실행 중...';
  btn.disabled=true;

  // 파이프라인 박스 리셋
  for(let i=0;i<6;i++){
    document.getElementById('mf'+i).classList.remove('active');
    if(i<5) document.getElementById('ma'+i).classList.remove('active');
  }

  let si=0;
  function nextStep(){
    if(si>=steps.length){
      overlay.classList.remove('show');
      spinner.style.display='none';
      btnTxt.textContent='▶ 예측 실행';
      btn.disabled=false;
      // 파이프라인 전체 활성화
      for(let i=0;i<6;i++){
        setTimeout(()=>{
          document.getElementById('mf'+i).classList.add('active');
          if(i<5) document.getElementById('ma'+i).classList.add('active');
        },i*120);
      }
      toast('GPA 예측 완료 — 총 소요 14.2초');
      return;
    }
    const [step,sub,pct]=steps[si];
    document.getElementById('runStep').textContent=step;
    document.getElementById('runSub').textContent=sub;
    document.getElementById('runProg').style.width=pct+'%';
    // 파이프라인 박스 순차 활성화
    const boxIdx=Math.min(Math.floor(si/1.5),5);
    document.getElementById('mf'+boxIdx).classList.add('active');
    if(boxIdx>0) document.getElementById('ma'+(boxIdx-1)).classList.add('active');
    si++;
    setTimeout(nextStep, si===steps.length ? 600 : 700);
  }
  nextStep();
}

// 앙상블 점 그리기
function drawEnsemble(){
  const grid=document.getElementById('ensGrid');
  const vals=[.68,.69,.70,.71,.71,.72,.72,.73,.73,.73,.74,.74,.74,.74,.74,.74,.74,.75,.75,.75,.75,.75,.76,.76,.76,.76,.77,.77,.77,.78,.78,.78,.78,.79,.79,.79,.79,.80,.80,.80,.80,.80,.81,.81,.81,.82,.82,.82,.82,.82];
  grid.innerHTML=vals.map(v=>{
    const h=Math.round((v-0.65)/0.2*100);
    const c=v>=0.7?'var(--red)':v>=0.5?'var(--orange)':'var(--amber)';
    return `<div class=&quot;ens-dot&quot; style=&quot;background:${c};height:${Math.max(8,h/5+8)}px;align-self:flex-end&quot;></div>`;
  }).join('');
}
drawEnsemble();

// 토스트
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

.mtab:hover{color:var(--text2);}
.mtab.on{color:var(--teal2);border-bottom-color:var(--teal2);}

/* 3단 레이아웃 */
.layout{display:flex;flex:1;overflow:hidden;}

/* ═══ 왼쪽: 파이프라인 상태 ═══ */
.left-panel{width:252px;flex-shrink:0;background:var(--panel);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.lp-head{padding:11px 13px 9px;border-bottom:1px solid var(--border);
  font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.lp-body{flex:1;overflow-y:auto;padding:10px 12px;}
.lp-body::-webkit-scrollbar{width:3px;}
.lp-body::-webkit-scrollbar-thumb{background:var(--border);}

/* 파이프라인 스텝 */
.pipe-step{display:flex;gap:10px;margin-bottom:4px;position:relative;}
.pipe-step:not(:last-child)::after{
  content:'';position:absolute;left:13px;top:28px;width:2px;height:calc(100% - 8px);
  background:var(--border);
}
.pipe-step.done::after{background:var(--teal);}
.ps-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;border:1px solid var(--border);background:var(--navy3);
  position:relative;z-index:1;transition:all .4s;}
.ps-icon.done{background:rgba(13,148,136,.2);border-color:var(--teal);box-shadow:0 0 8px rgba(13,148,136,.3);}
.ps-icon.run{background:rgba(14,95,161,.2);border-color:var(--blue);animation:run-pulse 1s infinite;}
.ps-icon.wait{opacity:.4;}
@keyframes run-pulse{0%,100%{box-shadow:0 0 0 0 rgba(14,95,161,.4)}50%{box-shadow:0 0 0 6px rgba(14,95,161,0)}}
.ps-body{flex:1;padding-top:2px;padding-bottom:12px;}
.ps-name{font-size:10px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ps-detail{font-size:9px;color:var(--text3);line-height:1.4;}
.ps-time{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--teal2);margin-top:2px;}

/* 성능 미터 */
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;}
.perf-card{background:var(--navy3);border:1px solid var(--border);border-radius:5px;padding:8px 9px;}
.pc-lbl{font-size:8px;color:var(--text3);margin-bottom:3px;letter-spacing:.5px;}
.pc-v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;}
.pc-sub{font-size:8px;color:var(--text3);margin-top:1px;}

/* Loss 그래프 미니 */
.mini-svg{width:100%;height:48px;}

/* ═══ 중앙: 메인 뷰 (탭별) ═══ */
.center{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tab-content{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.tab-content::-webkit-scrollbar{width:4px;}
.tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* 섹션 헤더 */
.sh{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}

/* 아키텍처 다이어그램 */

.arch-col{display:flex;flex-direction:column;gap:5px;}
.arch-arrow{display:flex;align-items:center;padding:0 6px;color:var(--b2);font-size:18px;flex-shrink:0;align-self:center;}
.arch-arrow.glow{color:var(--teal);text-shadow:0 0 8px rgba(13,148,136,.5);}

.abox{border:1px solid var(--border);border-radius:6px;padding:8px 10px;flex:1;
  background:var(--navy3);transition:all .3s;cursor:pointer;position:relative;overflow:hidden;}
.abox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.abox.c-teal::before{background:var(--teal2);}
.abox.c-blue::before{background:var(--blue);}
.abox.c-purple::before{background:var(--purple);}
.abox.c-green::before{background:var(--green);}
.abox.c-red::before{background:var(--red);}
.abox.c-amber::before{background:var(--amber);}
.abox:hover{border-color:var(--b2);background:rgba(255,255,255,.03);}
.abox.active{border-color:var(--teal);background:rgba(13,148,136,.08);box-shadow:0 0 12px rgba(13,148,136,.15);}
.ab-icon{font-size:14px;margin-bottom:4px;}
.ab-name{font-size:9px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;}
.ab-detail{font-size:8px;color:var(--text3);line-height:1.4;}
.ab-badge{font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px;margin-top:3px;display:inline-block;}

/* PINN 설명 카드 */
.pinn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pinn-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:13px;position:relative;overflow:hidden;}
.pinn-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.pinn-card.pc-teal::before{background:var(--teal2);}
.pinn-card.pc-purple::before{background:var(--purple);}
.pinn-card.pc-blue::before{background:var(--blue);}
.pinn-card.pc-green::before{background:var(--green);}
.pinn-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;}
.pinn-sub{font-size:10px;color:var(--text3);line-height:1.6;}
.pinn-formula{
  margin-top:8px;padding:7px 10px;border-radius:4px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal3);
  line-height:1.6;
}

/* Loss 곡선 */
.loss-wrap{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;}
.loss-legend{display:flex;gap:16px;margin-bottom:10px;}
.ll-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);}
.ll-line{width:18px;height:2px;border-radius:1px;}

/* 멀티소스 퓨전 */
.fusion-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.fsrc{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:10px;text-align:center;}
.fsrc-icon{font-size:18px;margin-bottom:5px;}
.fsrc-name{font-size:9px;font-weight:600;color:var(--text);margin-bottom:3px;}
.fsrc-detail{font-size:8px;color:var(--text3);line-height:1.4;}
.fsrc-bar{height:3px;border-radius:2px;margin-top:6px;}
.fusion-center{
  background:var(--panel);border:1px solid var(--teal);border-radius:8px;
  padding:12px;text-align:center;
  box-shadow:0 0 20px rgba(13,148,136,.15);
  display:flex;flex-direction:column;justify-content:center;
}
.fc-title{font-size:11px;font-weight:700;color:var(--teal2);margin-bottom:4px;}
.fc-sub{font-size:9px;color:var(--text3);line-height:1.5;}

/* 검증 테이블 */
.val-table{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.vt-head{background:var(--navy3);display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;
  padding:8px 12px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.5px;}
.vt-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;
  padding:8px 12px;border-top:1px solid var(--border);font-size:10px;transition:background .15s;}
.vt-row:hover{background:rgba(255,255,255,.02);}
.vt-name{color:var(--text);font-weight:500;}
.vt-cell{font-family:'JetBrains Mono',monospace;color:var(--text2);text-align:center;}
.good{color:var(--green);}
.ok{color:var(--teal2);}
.warn{color:var(--amber);}

/* 추론 실시간 모니터 */
.infer-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.infer-card{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:11px;}
.ic-label{font-size:9px;color:var(--text3);margin-bottom:5px;}
.ic-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
.ic-bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.ic-bar{height:4px;border-radius:2px;transition:width 1s ease;}
.ic-sub{font-size:9px;color:var(--text3);}

/* ═══ 오른쪽: 실시간 모니터 ═══ */
.right-panel{width:240px;flex-shrink:0;background:var(--panel);
  border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.rp-head{padding:11px 13px 9px;border-bottom:1px solid var(--border);
  font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.rp-body{flex:1;overflow-y:auto;padding:10px 12px;}
.rp-body::-webkit-scrollbar{width:3px;}
.rp-body::-webkit-scrollbar-thumb{background:var(--border);}

/* 실시간 로그 */
.log-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:9px;line-height:1.5;}
.log-t{font-family:'JetBrains Mono',monospace;color:var(--text3);margin-right:4px;}
.log-ok{color:var(--green);}
.log-warn{color:var(--amber);}
.log-info{color:var(--sky);}
.log-run{color:var(--teal2);}

/* GPU 모니터 */
.gpu-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.gpu-label{font-size:9px;color:var(--text3);width:60px;flex-shrink:0;}
.gpu-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.gpu-bar{height:6px;border-radius:3px;transition:width 1.5s ease;}
.gpu-val{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);width:32px;text-align:right;}

/* 예측 품질 */
.quality-ring{display:flex;justify-content:center;margin:8px 0;}

/* 상태바 */
.statusbar{height:26px;background:rgba(5,13,24,.97);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:16px;flex-shrink:0;}
.sbi{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);}
.sbd{width:5px;height:5px;border-radius:50%;}

/* 토스트 */
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(50px);
  background:rgba(13,148,136,.95);border:1px solid var(--teal2);border-radius:8px;

  z-index:9999;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  <div class=&quot;tab-content&quot; id=&quot;tc1&quot; style=&quot;display:none&quot;>
    <div>
      <div class=&quot;sh&quot;>Physics-Informed Neural Network (PINN) 구조</div>
      <div class=&quot;pinn-grid&quot;>

        <div class=&quot;pinn-card pc-teal&quot;>
          <div class=&quot;pinn-title&quot;>📐 Loss 함수 설계</div>
          <div class=&quot;pinn-sub&quot;>총 손실함수는 데이터 손실과 물리 제약 손실의 가중합으로 구성됩니다. λ₁·λ₂는 물리 제약 강도를 조절하는 하이퍼파라미터입니다.</div>
          <div class=&quot;pinn-formula&quot;>
            L_total = L_data<br>
            &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;+ λ₁ × L_physics<br>
            &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;+ λ₂ × L_boundary<br><br>
            현재: λ₁=0.8, λ₂=0.3<br>
            L_total = 0.0042 ✓
          </div>
        </div>

        <div class=&quot;pinn-card pc-purple&quot;>
          <div class=&quot;pinn-title&quot;>🌊 해양 물리 제약 조건</div>
          <div class=&quot;pinn-sub&quot;>해양 물리 방정식을 위반하는 예측에 페널티를 부과합니다. 데이터가 부족한 구간에서도 물리적으로 타당한 예측을 보장합니다.</div>
          <div class=&quot;pinn-formula&quot;>
            ① 열역학: ∂T/∂t + u·∇T = κ∇²T<br>
            ② 연속방정식: ∇·u = 0<br>
            ③ DO 소모: ∂O₂/∂t = -R·f(T,S)<br>
            ④ MLD: Ri &amp;lt; Ri_cr → 혼합<br>
            ⑤ 수온-염분 관계: T-S 제약
          </div>
        </div>

        <div class=&quot;pinn-card pc-blue&quot;>
          <div class=&quot;pinn-title&quot;>🔄 자동 미분 (AD) 적용</div>
          <div class=&quot;pinn-sub&quot;>PyTorch autograd를 활용해 편미분 항을 자동으로 계산합니다. 수치 미분 대비 정확도가 높고 역전파와 통합이 용이합니다.</div>
          <div class=&quot;pinn-formula&quot;>
            # PyTorch autograd<br>
            T = model(x, t)<br>
            dT_dt = grad(T, t)<br>
            dT_dx = grad(T, x)<br>
            L_phys = MSE(<br>
            &amp;nbsp;&amp;nbsp;dT_dt + u*dT_dx,<br>
            &amp;nbsp;&amp;nbsp;kappa*laplacian(T)<br>
            )
          </div>
        </div>

        <div class=&quot;pinn-card pc-green&quot;>
          <div class=&quot;pinn-title&quot;>✅ 물리 제약 검증 현황</div>

            열역학 보존: 99.8% ✓<br>

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.transform = 'translateY(0)';
  t.style.opacity = '1';
  setTimeout(() => { t.style.transform='translateY(80px)'; t.style.opacity='0'; }, 2500);
}
