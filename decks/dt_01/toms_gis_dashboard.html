<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMS GIS Dashboard</title>
<style>
  :root{
    --color-background-primary:#ffffff;
    --color-background-secondary:#f4f7fb;
    --color-border-secondary:#cfd8e3;
    --color-border-tertiary:#dce4ec;
    --color-text-primary:#192432;
    --color-text-secondary:#5f6f82;
    --color-text-tertiary:#8492a6;
    --border-radius-md:10px;
    --border-radius-lg:16px;
  }
  body{margin:0;padding:20px;background:#e9eff5;font-family:Pretendard,"Noto Sans KR",sans-serif;}

<style>
*{box-sizing:border-box;margin:0;padding:0}
.shell{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;font-size:13px}
.topbar{background:#1B3A6B;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.topbar-title{font-size:15px;font-weight:500}
.topbar-meta{font-size:12px;opacity:.75}
.body{display:flex;height:520px}
.sidebar{width:220px;min-width:220px;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-secondary)}
.sb-section{padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sb-label{font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.stat-row{display:flex;gap:8px;margin-bottom:4px}
.stat-chip{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;text-align:center}
.stat-chip .n{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.stat-chip .l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.chip-green .n{color:#27500A}.chip-green{border-color:#97C459;background:#EAF3DE}
.chip-amber .n{color:#633806}.chip-amber{border-color:#EF9F27;background:#FAEEDA}
.chip-red .n{color:#791F1F}.chip-red{border-color:#F09595;background:#FCEBEB}
.obs-list{flex:1;overflow-y:auto;padding:8px}
.obs-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--border-radius-md);cursor:pointer;margin-bottom:2px;border:0.5px solid transparent}
.obs-item:hover,.obs-item.active{background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.obs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#639922}.dot-warn{background:#BA7517}.dot-err{background:#E24B4A}
.obs-name{flex:1;font-size:13px;color:var(--color-text-primary)}
.obs-time{font-size:11px;color:var(--color-text-tertiary)}
.map-area{flex:1;position:relative;background:#EDF4FA;overflow:hidden}
.map-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.korea-map{opacity:.12}
.map-pin{position:absolute;cursor:pointer;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-100%)}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2.5px solid #fff}
.pin-ok{background:#639922}.pin-warn{background:#BA7517}.pin-err{background:#E24B4A}
.pin-pulse{width:22px;height:22px;border-radius:50%;opacity:.25;position:absolute;top:-4px;left:-4px}
.pin-pulse-err{background:#E24B4A;animation:pulse 1.4s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.3}100%{transform:scale(1.8);opacity:0}}
.tooltip{position:absolute;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;pointer-events:none;white-space:nowrap;z-index:10}
.tooltip-name{font-weight:500;margin-bottom:3px;color:var(--color-text-primary)}
.tooltip-row{color:var(--color-text-secondary)}
.map-legend{position:absolute;bottom:12px;left:12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:11px}
.leg-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.alert-bar{position:absolute;top:10px;right:10px;background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:#791F1F;cursor:pointer}
</style>
</head>
<body>

<div class="shell">
  <div class="topbar">
    <span class="topbar-title">TOMS — 해양관측시설 운영관리</span>
    <span class="topbar-meta">실시간  |  2026-03-31  09:14</span>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-label">전국 관측소 현황</div>
        <div class="stat-row">
          <div class="stat-chip chip-green"><div class="n">47</div><div class="l">정상</div></div>
          <div class="stat-chip chip-amber"><div class="n">4</div><div class="l">주의</div></div>
          <div class="stat-chip chip-red"><div class="n">2</div><div class="l">이상</div></div>
        </div>
      </div>
      <div class="sb-section" style="padding-bottom:6px">
        <div class="sb-label">관측소 목록</div>
      </div>
      <div class="obs-list">
        <div class="obs-item active">
          <span class="obs-dot dot-err"></span>
          <span class="obs-name">인천 조위관측소</span>
          <span class="obs-time">이상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-warn"></span>
          <span class="obs-name">군산 조위관측소</span>
          <span class="obs-time">주의</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-ok"></span>
          <span class="obs-name">부산 조위관측소</span>
          <span class="obs-time">정상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-ok"></span>
          <span class="obs-name">여수 조위관측소</span>
          <span class="obs-time">정상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-ok"></span>
          <span class="obs-name">속초 조위관측소</span>
          <span class="obs-time">정상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-warn"></span>
          <span class="obs-name">목포 조위관측소</span>
          <span class="obs-time">주의</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-ok"></span>
          <span class="obs-name">포항 조위관측소</span>
          <span class="obs-time">정상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-ok"></span>
          <span class="obs-name">제주 조위관측소</span>
          <span class="obs-time">정상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-err"></span>
          <span class="obs-name">통영 조위관측소</span>
          <span class="obs-time">이상</span>
        </div>
        <div class="obs-item">
          <span class="obs-dot dot-warn"></span>
          <span class="obs-name">울산 조위관측소</span>
          <span class="obs-time">주의</span>
        </div>
      </div>
    </div>

    <div class="map-area">
      <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 520 520" preserveAspectRatio="xMidYMid meet">
        <path class="korea-map" fill="#1B3A6B" d="M200 80 C220 70,260 75,280 90 L310 120 C330 140,340 170,335 200 L320 240 C310 270,290 300,275 320 L260 360 C250 380,255 400,245 420 L230 440 C220 455,205 460,195 450 L180 430 C165 415,155 390,160 370 L165 340 C170 310,165 280,155 260 L145 230 C135 200,130 170,140 145 L155 115 C165 95,185 87,200 80Z"/>
        <line x1="0" y1="490" x2="520" y2="490" stroke="#B5D4F4" stroke-width="40" opacity=".3"/>
        <line x1="0" y1="30" x2="100" y2="30" stroke="#B5D4F4" stroke-width="60" opacity=".25"/>
        <line x1="370" y1="30" x2="520" y2="30" stroke="#B5D4F4" stroke-width="60" opacity=".25"/>
      </svg>

      <div class="map-pin" style="left:35%;top:38%" id="pin-incheon">
        <div style="position:relative">
          <div class="pin-pulse pin-pulse-err"></div>
          <div class="pin-dot pin-err"></div>
        </div>
      </div>
      <div class="map-pin" style="left:31%;top:52%">
        <div class="pin-dot pin-warn"></div>
      </div>
      <div class="map-pin" style="left:62%;top:74%">
        <div class="pin-dot pin-ok"></div>
      </div>
      <div class="map-pin" style="left:40%;top:78%">
        <div class="pin-dot pin-ok"></div>
      </div>
      <div class="map-pin" style="left:74%;top:28%">
        <div class="pin-dot pin-ok"></div>
      </div>
      <div class="map-pin" style="left:27%;top:72%">
        <div class="pin-dot pin-ok"></div>
      </div>
      <div class="map-pin" style="left:70%;top:55%">
        <div class="pin-dot pin-ok"></div>
      </div>
      <div class="map-pin" style="left:42%;top:88%">
        <div class="pin-dot pin-ok"></div>
      </div>
      <div class="map-pin" style="left:55%;top:80%">
        <div style="position:relative">
          <div class="pin-pulse pin-pulse-err"></div>
          <div class="pin-dot pin-err"></div>
        </div>
      </div>
      <div class="map-pin" style="left:67%;top:62%">
        <div class="pin-dot pin-warn"></div>
      </div>
      <div class="map-pin" style="left:29%;top:60%">
        <div class="pin-dot pin-warn"></div>
      </div>

      <div class="alert-bar" onclick="sendPrompt('인천 조위관측소 이상 상황 상세 분석')">
        ⚠ 인천 센서 이상 감지 — 상세 보기 ↗
      </div>

      <div id="tt" class="tooltip" style="display:none;top:32%;left:38%">
        <div class="tooltip-name">인천 조위관측소</div>
        <div class="tooltip-row">조위: 데이터 수신 중단 (14분)</div>
        <div class="tooltip-row">장비: 압력센서 이상</div>
        <div class="tooltip-row">담당: 김철수 기술자</div>
      </div>

      <div class="map-legend">
        <div class="leg-item"><div class="leg-dot" style="background:#639922"></div>정상 운영</div>
        <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>주의 필요</div>
        <div class="leg-item"><div class="leg-dot" style="background:#E24B4A"></div>이상 감지</div>
      </div>
    </div>
  </div>
</div>
<script>
const pin=document.getElementById('pin-incheon');
const tt=document.getElementById('tt');
pin.addEventListener('mouseenter',()=>tt.style.display='block');
pin.addEventListener('mouseleave',()=>tt.style.display='none');
</script>
</body>
</html>
