<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Field Inspection</title>
<style>
  :root{
    --color-background-primary:#ffffff;
    --color-background-secondary:#f4f7fb;
    --color-border-secondary:#cfd8e3;
    --color-border-tertiary:#dce4ec;
    --color-text-primary:#192432;
    --color-text-secondary:#5f6f82;
    --color-text-tertiary:#8492a6;
    --border-radius-md:10px;
    --border-radius-lg:16px;
  }
  body{margin:0;padding:20px;background:#e9eff5;font-family:Pretendard,"Noto Sans KR",sans-serif;}

<style>
*{box-sizing:border-box;margin:0;padding:0}
.stage{background:var(--color-background-secondary);padding:20px;display:flex;justify-content:center;border-radius:var(--border-radius-lg)}
.phone{width:320px;background:var(--color-background-primary);border-radius:28px;border:0.5px solid var(--color-border-secondary);overflow:hidden;font-size:13px}
.status-bar{background:#0F6E56;height:44px;display:flex;align-items:center;padding:0 16px;justify-content:space-between}
.sb-left{color:#9FE1CB;font-size:12px}
.sb-center{color:#fff;font-size:14px;font-weight:500}
.sb-right{color:#9FE1CB;font-size:11px}
.app-body{padding:14px}
.top-card{background:#0F6E56;border-radius:12px;padding:14px;margin-bottom:14px;color:#fff}
.tc-sub{font-size:11px;opacity:.7;margin-bottom:4px}
.tc-name{font-size:16px;font-weight:500;margin-bottom:2px}
.tc-meta{font-size:11px;opacity:.75}
.tc-auto{background:rgba(255,255,255,.15);border-radius:6px;padding:4px 8px;font-size:11px;margin-top:8px;display:inline-block}
.section{margin-bottom:14px}
.sec-title{font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.check-list{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)}
.check-circle{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid}
.cc-done{background:#EAF3DE;border-color:#97C459}
.cc-warn{background:#FAEEDA;border-color:#EF9F27}
.cc-pend{background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.check-label{flex:1;font-size:13px;color:var(--color-text-primary)}
.check-status{font-size:11px}
.s-ok{color:#27500A}.s-warn{color:#633806}.s-pend{color:var(--color-text-tertiary)}
.photo-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.photo-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-thumb{width:100%;height:100%;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:10px;color:#085041}
.photo-add{color:var(--color-text-tertiary);font-size:20px}
.note-box{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:10px;font-size:13px;color:var(--color-text-primary);resize:none;font-family:inherit;margin-bottom:14px}
.submit-btn{width:100%;padding:13px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px}
.auto-note{font-size:11px;color:var(--color-text-tertiary);text-align:center;padding-bottom:4px}
.warn-banner{background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:8px;padding:9px 11px;margin-bottom:12px;font-size:12px;color:#633806}
</style>
</head>
<body>

<div class="stage">
  <div class="phone">
    <div class="status-bar">
      <span class="sb-left">9:22</span>
      <span class="sb-center">TOMS 현장점검</span>
      <span class="sb-right">LTE ▪▪▪</span>
    </div>
    <div class="app-body">

      <div class="top-card">
        <div class="tc-sub">현재 담당 관측소</div>
        <div class="tc-name">인천 조위관측소</div>
        <div class="tc-meta">정기점검  |  2026-03-31</div>
        <div class="tc-auto">AI 알람 연동 점검 — 자동 배정</div>
      </div>

      <div class="warn-banner">
        ⚠ 압력식 조위계 이상 감지됨 — 중점 확인 필요
      </div>

      <div class="section">
        <div class="sec-title">점검 체크리스트</div>
        <div class="check-list">
          <div class="check-item">
            <div class="check-circle cc-done">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8 3" stroke="#27500A" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <span class="check-label">통신 상태 확인</span>
            <span class="check-status s-ok">정상</span>
          </div>
          <div class="check-item" style="border-color:#EF9F27">
            <div class="check-circle cc-warn">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 2.5V6M5 7.5V8" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <span class="check-label">압력식 조위계</span>
            <span class="check-status s-warn">이상 확인</span>
          </div>
          <div class="check-item">
            <div class="check-circle cc-done">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8 3" stroke="#27500A" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <span class="check-label">기압계 상태</span>
            <span class="check-status s-ok">정상</span>
          </div>
          <div class="check-item">
            <div class="check-circle cc-done">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8 3" stroke="#27500A" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <span class="check-label">태양광·배터리</span>
            <span class="check-status s-ok">87%</span>
          </div>
          <div class="check-item">
            <div class="check-circle cc-pend"></div>
            <span class="check-label">외부 시설물 점검</span>
            <span class="check-status s-pend">미완료</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">현장 사진</div>
        <div class="photo-row">
          <div class="photo-box">
            <div class="photo-thumb">조위계<br>전면</div>
          </div>
          <div class="photo-box">
            <div class="photo-thumb">센서<br>클로즈업</div>
          </div>
          <div class="photo-box">
            <div class="photo-add">+</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">점검 메모</div>
        <div class="note-box" style="height:60px">압력센서 드리프트 확인. 재보정 시도했으나 지속 오차 발생. 센서 교체 필요. 부품 요청 예정.</div>
      </div>

      <button class="submit-btn" onclick="sendPrompt('인천 조위관측소 점검 결과 제출 및 경력 자동 반영 확인')">
        점검 완료 제출
      </button>
      <div class="auto-note">제출 즉시 경력관리 시스템에 자동 반영됩니다</div>

    </div>
  </div>
</div>
<script>
function sendPrompt(message){ console.log(message); }
</script>
</body>
</html>
