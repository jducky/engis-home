    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const container = document.getElementById("md-viewer-content");

      const escapeHtml = (value) =>
        value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      const inlineMarkdown = (value) => {
        let text = escapeHtml(value);
        text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        return text;
      };

      const renderMarkdown = (source) => {
        const lines = source.replace(/\r\n/g, "\n").split("\n");
        const chunks = [];
        let inList = false;
        let listType = "";
        let inCode = false;
        let codeBuffer = [];
        let paragraphBuffer = [];

        const flushParagraph = () => {
          if (!paragraphBuffer.length) return;
          chunks.push(`<p>${inlineMarkdown(paragraphBuffer.join(" "))}</p>`);
          paragraphBuffer = [];
        };

        const closeList = () => {
          if (!inList) return;
          chunks.push(`</${listType}>`);
          inList = false;
          listType = "";
        };

        const flushCode = () => {
          if (!inCode) return;
          chunks.push(`<pre><code>${escapeHtml(codeBuffer.join("\n"))}</code></pre>`);
          inCode = false;
          codeBuffer = [];
        };

        for (const rawLine of lines) {
          const line = rawLine.trimEnd();

          if (line.startsWith("```")) {
            flushParagraph();
            closeList();
            if (inCode) {
              flushCode();
            } else {
              inCode = true;
              codeBuffer = [];
            }
            continue;
          }

          if (inCode) {
            codeBuffer.push(rawLine);
            continue;
          }

          const trimmed = line.trim();

          if (!trimmed) {
            flushParagraph();
            closeList();
            continue;
          }

          const heading = trimmed.match(/^(#{1,3})\s+(.*)$/);
          if (heading) {
            flushParagraph();
            closeList();
            const level = heading[1].length;
            chunks.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
            continue;
          }

          if (/^---+$/.test(trimmed) || /^___+$/.test(trimmed)) {
            flushParagraph();
            closeList();
            chunks.push("<hr />");
            continue;
          }

          const quote = trimmed.match(/^>\s?(.*)$/);
          if (quote) {
            flushParagraph();
            closeList();
            chunks.push(`<blockquote>${inlineMarkdown(quote[1])}</blockquote>`);
            continue;
          }

          const ul = trimmed.match(/^[-*]\s+(.*)$/);
          if (ul) {
            flushParagraph();
            if (!inList || listType !== "ul") {
              closeList();
              inList = true;
              listType = "ul";
              chunks.push("<ul>");
            }
            chunks.push(`<li>${inlineMarkdown(ul[1])}</li>`);
            continue;
          }

          const ol = trimmed.match(/^\d+\.\s+(.*)$/);
          if (ol) {
            flushParagraph();
            if (!inList || listType !== "ol") {
              closeList();
              inList = true;
              listType = "ol";
              chunks.push("<ol>");
            }
            chunks.push(`<li>${inlineMarkdown(ol[1])}</li>`);
            continue;
          }

          paragraphBuffer.push(trimmed);
        }

        flushParagraph();
        closeList();
        flushCode();
        return chunks.join("\n");
      };

      const renderEmpty = (message) => {
        container.className = "md-viewer-empty";
        container.textContent = message;
      };

      fetch("./md/mds.json")
        .then((response) => response.json())
        .then((items) => {
          if (!slug) {
            renderEmpty("Markdown 문서가 지정되지 않았습니다.");
            return;
          }

          const item = Array.isArray(items) ? items.find((entry) => entry.slug === slug) : null;
          if (!item) {
            renderEmpty("요청한 Markdown 정보를 찾을 수 없습니다.");
            return;
          }

          return fetch(item.file)
            .then((response) => response.text())
            .then((markdown) => {
              document.title = `${item.title} | Markdown 보기 | EnGIS`;
              container.className = "";
              container.innerHTML = `
                <section class="md-viewer-header">
                  <p class="section-kicker">${item.category || "Markdown"}</p>
                  <h1>${item.title}</h1>
                  <p class="hero-text">${item.description || ""}</p>
                  <div class="hero-actions">
                    <a class="button button-secondary" href="./md-library.html">목록으로 돌아가기</a>
                    <a class="button button-primary" href="${item.file}" target="_blank" rel="noreferrer">원문 열기</a>
                  </div>
                </section>
                <article class="md-render">${renderMarkdown(markdown)}</article>
              `;
            });
        })
        .catch(() => {
          renderEmpty("Markdown 정보를 불러오지 못했습니다.");
        });
    </script>
